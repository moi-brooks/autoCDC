services:
  db:
    image: postgres:15-alpine
    container_name: autocdc-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: autocdc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: autocdc-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
